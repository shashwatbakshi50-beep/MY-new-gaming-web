<!DOCTYPE html>

  <body>
  <!DOCTYPE html>
<html>
<head>
<title>Forex Trading Pro</title>
<script src="https://s3.tradingview.com/tv.js"></script>
<style>
body{
    margin:0;
    background:#0b0e11;
    font-family:Segoe UI;
    color:white;
}
.topbar{
    background:#131722;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #222;
}
.logo{
    font-weight:bold;
    font-size:18px;
    color:#f23645;
}
.stats span{
    margin-right:15px;
    font-size:13px;
}
.container{
    display:flex;
    height:calc(100vh - 60px);
}
.sidebar{
    width:270px;
    background:#131722;
    padding:15px;
    border-right:1px solid #222;
}
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}
.chart{
    flex:3;
}
.bottom{
    flex:1;
    background:#131722;
    border-top:1px solid #222;
    padding:10px;
    overflow:auto;
}
input,select{
    width:100%;
    padding:6px;
    margin:5px 0;
    background:#0b0e11;
    border:1px solid #333;
    color:white;
}
button{
    width:100%;
    padding:8px;
    margin-top:6px;
    border:none;
    font-weight:bold;
    cursor:pointer;
}
.buy{background:#089981;}
.sell{background:#f23645;}
.green{color:#00ff9d;}
.red{color:#ff4d4d;}
.warning{
    margin-top:8px;
    font-size:12px;
}
table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}
th,td{
    padding:6px;
    border-bottom:1px solid #222;
}
.loss-message{
    font-weight:bold;
    margin-top:5px;
}
</style>
</head>
<body>

<div class="topbar">
<div class="logo">🔥chapal khaega- FOREX TRADING PRO</div>
<div class="stats">
<span>Balance: $<span id="balance">10000</span></span>
<span>Equity: $<span id="equity">10000</span></span>
<span>Margin Used: $<span id="margin">0</span></span>
</div>
</div>

<div class="container">

<div class="sidebar">
<h3>Order Ticket</h3>
Lot Size
<input type="number" id="lot" value="1">
Leverage
<select id="lev">
<option value="10">10x</option>
<option value="50">50x</option>
<option value="100">100x</option>
</select>

<button class="buy" onclick="openTrade('BUY')">BUY MARKET</button>
<button class="sell" onclick="openTrade('SELL')">SELL MARKET</button>

<div class="warning">
⚠ High Risk Leveraged Product
</div>

<div id="lossMsg" class="loss-message red"></div>
</div>

<div class="main">
<div class="chart" id="chart"></div>

<div class="bottom">
<h3>Open Positions</h3>
<table>
<thead>
<tr>
<th>Type</th>
<th>Lot</th>
<th>Entry</th>
<th>P/L</th>
<th>Close</th>
</tr>
</thead>
<tbody id="positions"></tbody>
</table>
</div>
</div>
</div>

<script>
new TradingView.widget({
  "width": "100%",
  "height": "100%",
  "symbol": "FX:EURUSD",
  "interval": "15",
  "timezone": "Asia/Kolkata",
  "theme": "dark",
  "style": "1",
  "locale": "en",
  "container_id": "chart"
});

let balance=10000;
let positions=[];
let price=1.1000;
let marginUsed=0;

function simulatePrice(){
    price += (Math.random()-0.5)/200;
    updatePositions();
}
setInterval(simulatePrice,1000);

function openTrade(type){
    let lot=parseFloat(document.getElementById("lot").value);
    let lev=parseInt(document.getElementById("lev").value);

    let margin=lot*1000/lev;

    if(balance < margin){
        alert("Insufficient margin!");
        return;
    }

    marginUsed += margin;
    balance -= margin;

    let trade={
        type:type,
        lot:lot,
        entry:price,
        lev:lev,
        pl:0,
        margin:margin
    };

    positions.push(trade);
    renderPositions();
    updateStats();
}

function updatePositions(){
    let totalPL=0;

    positions.forEach(p=>{
        let diff=price - p.entry;
        if(p.type==="SELL") diff*=-1;

        p.pl = diff*10000*p.lot*p.lev;
        totalPL += p.pl;
    });

    let equity = balance + marginUsed + totalPL;

    document.getElementById("equity").innerText=equity.toFixed(2);

    if(totalPL < 0){

        document.getElementById("lossMsg").innerHTML=`
        Loss ho raha hai… chappal khayega kya?<br>
        Garh bik jayega tera!<br>
        Mummy se pitega kya?<br>
        Garh ja aur chupne ki jagah dhoondh, flying chappal aa rahi hai!<br>
        Bete trading sikh raha hai ya garh bikvane ki tayari kar raha hai?<br>
        Tere aisi ki taisi bete, aaj ghar aa tu!
        `;

    }else{
        document.getElementById("lossMsg").innerHTML="";
    }

    renderPositions();
}

function renderPositions(){
    let html="";
    positions.forEach((p,i)=>{
        html+=`
        <tr>
        <td>${p.type}</td>
        <td>${p.lot}</td>
        <td>${p.entry.toFixed(4)}</td>
        <td class="${p.pl>=0?'green':'red'}">${p.pl.toFixed(2)}</td>
        <td><button onclick="closeTrade(${i})">X</button></td>
        </tr>
        `;
    });
    document.getElementById("positions").innerHTML=html;
}

function closeTrade(i){
    balance += positions[i].margin + positions[i].pl;
    marginUsed -= positions[i].margin;
    positions.splice(i,1);
    updateStats();
    renderPositions();
}

function updateStats(){
    document.getElementById("balance").innerText=balance.toFixed(2);
    document.getElementById("margin").innerText=marginUsed.toFixed(2);
}
</script>

</body>
</html>
    
  </body>
  
</html>
