<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Gaming Store</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<!-- Razorpay Checkout -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
    body { margin:0; font-family: Arial,sans-serif; background:#0b0e11; color:white;}
    header { background:#131722; padding:20px; display:flex; justify-content:space-between; align-items:center;}
    header a { color:white; text-decoration:none; margin:0 10px; }
    .games { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:20px; }
    .game { background:#1c1f28; padding:15px; border-radius:10px; }
    .game img { width:100%; border-radius:10px; }
    button { padding:10px 20px; background:#ff5722; border:none; color:white; cursor:pointer; border-radius:5px; margin-top:10px;}
    #loginForm, #registerForm, #donationForm { display:none; padding:20px; max-width:400px; margin:30px auto; background:#1c1f28; border-radius:10px; }
    input { width:100%; padding:10px; margin:10px 0; border-radius:5px; border:none; }
    h2 { text-align:center; }
</style>
</head>
<body>

<header>
    <h1>My Gaming Store</h1>
    <div>
        <a href="#" onclick="showLogin()">Login</a>
        <a href="#" onclick="showRegister()">Register</a>
        <a href="#" onclick="showDonation()">Donate</a>
        <a href="#" id="logoutBtn" style="display:none;" onclick="logout()">Logout</a>
    </div>
</header>

<!-- Login Form -->
<div id="loginForm">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- Register Form -->
<div id="registerForm">
    <h2>Register</h2>
    <input type="email" id="registerEmail" placeholder="Email">
    <input type="password" id="registerPassword" placeholder="Password">
    <button onclick="register()">Register</button>
</div>

<!-- Donation Form -->
<div id="donationForm">
    <h2>Donate for Dogs 🐶</h2>
    <input type="number" id="donationAmount" placeholder="Enter Amount (₹)">
    <button onclick="donate()">Donate</button>
</div>

<!-- Games Section -->
<div class="games" id="gamesList"></div>

<script>
    // ================= FIREBASE CONFIG =================
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "shashwatbakshi80@outlook.com",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    // ================= SAMPLE GAMES =================
    const games = [
        { name:"Forex Market pro", price:100, image:"https://via.placeholder.com/250x150", file:"forex.zip" },
        { name:"stock market simulator", price:91, image:"https://via.placeholder.com/250x150", file:"adventure.zip" },
        { name:"Space Shooter", price:12, image:"https://via.placeholder.com/250x150", file:"spaceshooter.zip" }
    ];

    function renderGames() {
        const container = document.getElementById('gamesList');
        container.innerHTML = "";
        games.forEach((game, index)=>{
            const div = document.createElement('div');
            div.className="game";
            div.innerHTML=`
                <img src="${game.image}" alt="${game.name}">
                <h3>${game.name}</h3>
                <p>Price: $${game.price}</p>
                <button onclick="buyGame(${index})">Buy Now</button>
            `;
            container.appendChild(div);
        });
    }
    renderGames();

    // ================= SHOW / HIDE FORMS =================
    function showLogin(){ document.getElementById('loginForm').style.display="block"; document.getElementById('registerForm').style.display="none"; document.getElementById('donationForm').style.display="none"; }
    function showRegister(){ document.getElementById('registerForm').style.display="block"; document.getElementById('loginForm').style.display="none"; document.getElementById('donationForm').style.display="none"; }
    function showDonation(){ document.getElementById('donationForm').style.display="block"; document.getElementById('loginForm').style.display="none"; document.getElementById('registerForm').style.display="none"; }

    // ================= AUTHENTICATION =================
    function register(){
        const email = document.getElementById('registerEmail').value;
        const pass = document.getElementById('registerPassword').value;
        auth.createUserWithEmailAndPassword(email, pass)
        .then(user=>{ alert("Registered Successfully!"); document.getElementById('registerForm').style.display="none"; })
        .catch(err=>alert(err.message));
    }

    function login(){
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        auth.signInWithEmailAndPassword(email, pass)
        .then(user=>{ alert("Logged In!"); document.getElementById('loginForm').style.display="none"; document.getElementById('logoutBtn').style.display="inline"; })
        .catch(err=>alert(err.message));
    }

    function logout(){
        auth.signOut().then(()=>{ alert("Logged Out"); document.getElementById('logoutBtn').style.display="none"; });
    }

    // ================= BUY GAME =================
    function buyGame(index){
        const user = auth.currentUser;
        if(!user){ alert("Please login first"); return; }
        const game = games[index];

        const options = {
            "key": "8307077846@ybl", // Replace with your Razorpay Key
            "amount": game.price*100, // in ruppes
            "currency": "INR",
            "name": "My Gaming Store",
            "description": game.name,
            "handler": function(response){
                db.collection('purchases').add({
                    user:user.email,
                    game:game.name,
                    date: new Date(),
                    paymentId:response.razorpay_payment_id
                }).then(()=>{
                    alert(`Payment Successful! Download your game: ${game.file}`);
                });
            },
            "prefill": { "email": user.email }
        };
        const rzp = new Razorpay(options);
        rzp.open();
    }

    // ================= DONATION =================
    function donate(){
        const amount = document.getElementById('donationAmount').value;
        const user = auth.currentUser;
        if(!user){ alert("Please login first"); return; }
        if(!amount || amount <=0){ alert("Enter valid amount"); return; }

        const options = {
            "key": "8307077846@ybl", // Replace with your Razorpay Key
            "amount": amount*10, // in ruppess
            "currency": "INR",
            "name": "My Gaming Store Donations",
            "description": "Donation for Dogs 🐶",
            "handler": function(response){
                db.collection('donations').add({
                    user:user.email,
                    amount:amount,
                    date: new Date(),
                    paymentId:response.razorpay_payment_id
                }).then(()=>{ alert("Thank you for your donation!"); document.getElementById('donationForm').style.display="none"; });
            },
            "prefill": { "email": user.email }
        };
        const rzp = new Razorpay(options);
        rzp.open();
    }

</script>
</body>
</html>
